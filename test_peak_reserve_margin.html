<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peak Reserve Margin Calculation Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }
        .test-result {
            background-color: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 5px solid #ccc;
        }
        .test-result.pass {
            border-left-color: #4caf50;
        }
        .test-result.fail {
            border-left-color: #f44336;
        }
        h1 {
            color: #333;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }
        .summary {
            background-color: #e3f2fd;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Peak Reserve Margin Calculation Test</h1>
    <p>This test validates that the peak reserve margin calculation correctly computes unused dispatchable capacity.</p>
    <p><strong>New Formula:</strong> (Unused Dispatchable Capacity / Peak Load) × 100%</p>
    <p><strong>Where:</strong> Unused = Available Dispatchable - Actual Dispatch at Peak Hour</p>
    
    <div id="results"></div>
    
    <script>
        function runTests() {
            const results = [];
            
            // Helper function to check if a technology is dispatchable (thermal or storage)
            function isThermalOrStorage(techId) {
                return techId === 'coal' || techId === 'oil' || techId === 'other' || 
                       techId === 'existing-gas' || techId === 'new-gas-ccgt' || techId === 'new-gas-ct' || 
                       techId === 'storage';
            }
            
            // Test 1: Simple scenario with thermal only
            {
                const testName = "Test 1: Thermal Only (No Storage)";
                const peakLoadHour = 0;
                const peakLoad = 1000; // MW
                
                const installedCapacities = {
                    'coal': 500,
                    'existing-gas': 600,
                    'solar': 200,  // non-dispatchable
                    'wind': 300    // non-dispatchable
                };
                
                const hourlyGeneration = {
                    'Coal': [300],           // 300 MW dispatched
                    'Existing Gas': [400],   // 400 MW dispatched
                    'Solar': [150],          // non-dispatchable (not counted)
                    'Wind': [200]            // non-dispatchable (not counted)
                };
                
                // Available dispatchable = 500 + 600 = 1100 MW
                // Actual dispatch = 300 + 400 = 700 MW
                // Unused = 1100 - 700 = 400 MW
                // Reserve margin = (400 / 1000) × 100% = 40%
                
                const availableDispatchable = 500 + 600;
                const actualDispatch = 300 + 400;
                const unusedCapacity = availableDispatchable - actualDispatch;
                const expectedRM = (unusedCapacity / peakLoad) * 100;
                
                const pass = Math.abs(expectedRM - 40.0) < 0.01;
                results.push({
                    name: testName,
                    pass: pass,
                    details: `Peak Load: ${peakLoad} MW\n` +
                             `Available Dispatchable: ${availableDispatchable} MW (Coal: 500, Gas: 600)\n` +
                             `Actual Dispatch: ${actualDispatch} MW (Coal: 300, Gas: 400)\n` +
                             `Unused Capacity: ${unusedCapacity} MW\n` +
                             `Expected RM: ${expectedRM.toFixed(2)}%\n` +
                             `Status: ${pass ? 'PASS ✓' : 'FAIL ✗'}`
                });
            }
            
            // Test 2: With storage (SOC limited)
            {
                const testName = "Test 2: With Storage (SOC Limited)";
                const peakLoadHour = 0;
                const peakLoad = 1500; // MW
                
                const installedCapacities = {
                    'coal': 600,
                    'storage': 200,  // Installed capacity
                    'solar': 300     // non-dispatchable
                };
                
                const storageSOC = [150]; // Only 150 MWh available (less than 200 MW capacity)
                
                const hourlyGeneration = {
                    'Coal': [500],     // 500 MW dispatched
                    'Storage': [100],  // 100 MW discharged (positive = discharge)
                    'Solar': [200]     // non-dispatchable
                };
                
                // Available dispatchable = 600 (coal) + min(200, 150) (storage) = 750 MW
                // Actual dispatch = 500 (coal) + 100 (storage) = 600 MW
                // Unused = 750 - 600 = 150 MW
                // Reserve margin = (150 / 1500) × 100% = 10%
                
                const availableDispatchable = 600 + Math.min(200, 150);
                const actualDispatch = 500 + 100;
                const unusedCapacity = availableDispatchable - actualDispatch;
                const expectedRM = (unusedCapacity / peakLoad) * 100;
                
                const pass = Math.abs(expectedRM - 10.0) < 0.01;
                results.push({
                    name: testName,
                    pass: pass,
                    details: `Peak Load: ${peakLoad} MW\n` +
                             `Available Dispatchable: ${availableDispatchable} MW (Coal: 600, Storage: min(200, 150)=150)\n` +
                             `Actual Dispatch: ${actualDispatch} MW (Coal: 500, Storage: 100)\n` +
                             `Unused Capacity: ${unusedCapacity} MW\n` +
                             `Expected RM: ${expectedRM.toFixed(2)}%\n` +
                             `Status: ${pass ? 'PASS ✓' : 'FAIL ✗'}`
                });
            }
            
            // Test 3: Storage charging (negative generation)
            {
                const testName = "Test 3: Storage Charging (Should Ignore Negative)";
                const peakLoadHour = 0;
                const peakLoad = 1000; // MW
                
                const installedCapacities = {
                    'existing-gas': 800,
                    'storage': 200
                };
                
                const storageSOC = [180]; // 180 MWh available
                
                const hourlyGeneration = {
                    'Existing Gas': [700],
                    'Storage': [-50]  // Charging (negative = charging, should not count in dispatch)
                };
                
                // Available dispatchable = 800 + min(200, 180) = 980 MW
                // Actual dispatch = 700 + max(0, -50) = 700 MW (charging doesn't count)
                // Unused = 980 - 700 = 280 MW
                // Reserve margin = (280 / 1000) × 100% = 28%
                
                const availableDispatchable = 800 + Math.min(200, 180);
                const actualDispatch = 700 + Math.max(0, -50);
                const unusedCapacity = availableDispatchable - actualDispatch;
                const expectedRM = (unusedCapacity / peakLoad) * 100;
                
                const pass = Math.abs(expectedRM - 28.0) < 0.01;
                results.push({
                    name: testName,
                    pass: pass,
                    details: `Peak Load: ${peakLoad} MW\n` +
                             `Available Dispatchable: ${availableDispatchable} MW (Gas: 800, Storage: 180)\n` +
                             `Actual Dispatch: ${actualDispatch} MW (Gas: 700, Storage charging ignored)\n` +
                             `Unused Capacity: ${unusedCapacity} MW\n` +
                             `Expected RM: ${expectedRM.toFixed(2)}%\n` +
                             `Status: ${pass ? 'PASS ✓' : 'FAIL ✗'}`
                });
            }
            
            // Test 4: All thermal dispatched (low reserve margin)
            {
                const testName = "Test 4: High Utilization (Low Reserve Margin)";
                const peakLoadHour = 0;
                const peakLoad = 1000; // MW
                
                const installedCapacities = {
                    'coal': 400,
                    'existing-gas': 600,
                    'solar': 100
                };
                
                const hourlyGeneration = {
                    'Coal': [400],           // Fully dispatched
                    'Existing Gas': [580],   // Almost fully dispatched
                    'Solar': [80]            // non-dispatchable
                };
                
                // Available dispatchable = 400 + 600 = 1000 MW
                // Actual dispatch = 400 + 580 = 980 MW
                // Unused = 1000 - 980 = 20 MW
                // Reserve margin = (20 / 1000) × 100% = 2%
                
                const availableDispatchable = 400 + 600;
                const actualDispatch = 400 + 580;
                const unusedCapacity = availableDispatchable - actualDispatch;
                const expectedRM = (unusedCapacity / peakLoad) * 100;
                
                const pass = Math.abs(expectedRM - 2.0) < 0.01;
                results.push({
                    name: testName,
                    pass: pass,
                    details: `Peak Load: ${peakLoad} MW\n` +
                             `Available Dispatchable: ${availableDispatchable} MW\n` +
                             `Actual Dispatch: ${actualDispatch} MW (High utilization)\n` +
                             `Unused Capacity: ${unusedCapacity} MW\n` +
                             `Expected RM: ${expectedRM.toFixed(2)}%\n` +
                             `Status: ${pass ? 'PASS ✓' : 'FAIL ✗'}`
                });
            }
            
            // Test 5: Storage SOC Timing (Before vs After Discharge)
            {
                const testName = "Test 5: Storage SOC Timing - Critical Edge Case";
                const peakLoadHour = 1;  // Peak at hour 1
                const peakLoad = 1000; // MW
                
                const installedCapacities = {
                    'existing-gas': 600,
                    'storage': 200  // 200 MW capacity
                };
                
                // Storage SOC array (SOC at END of each hour)
                // Hour 0: Storage charges, ends with 150 MWh
                // Hour 1 (peak): Storage discharges 200 MW (fully), ends with 0 MWh
                const storageSOC = [150, 0];  // SOC at end of hour 0, 1
                
                const hourlyGeneration = {
                    'Existing Gas': [500, 600],
                    'Storage': [-100, 200]  // Hour 0: charge 100 MW, Hour 1: discharge 200 MW
                };
                
                // CRITICAL: Must use SOC from BEFORE discharge at peak hour
                // Peak is hour 1, so use storageSOC[0] = 150 MWh (SOC at start of hour 1)
                
                // WRONG calculation (using SOC after discharge):
                // Available = min(200, storageSOC[1]) = min(200, 0) = 0 MW ❌
                // Dispatched = 200 MW
                // Unused = 0 - 200 = -200 MW ❌ (NONSENSE!)
                
                // CORRECT calculation (using SOC before discharge):
                // Available = min(200, storageSOC[0]) = min(200, 150) = 150 MW ✓
                // Dispatched = 200 MW (but only 150 MW was actually available from SOC)
                // Wait, this doesn't make sense either...
                
                // Actually, if we discharge 200 MW and started with 150 MWh,
                // we can only discharge what we have. But hourlyGeneration says 200 MW.
                // Let me recalculate: If discharge is 200 MW for 1 hour = 200 MWh,
                // but we only had 150 MWh, then something is wrong with my example.
                
                // Let me fix the example:
                // Hour 0: SOC starts at 0, charges 100 MW = 100 MWh * 0.85 RTE = 85 MWh stored
                //         (But let's say it charged more, so SOC ends at 200 MWh)
                // Hour 1: SOC starts at 200 MWh, discharges 150 MW = 150 MWh
                //         SOC ends at 200 - 150 = 50 MWh
                
                // Revised:
                const storageSOC_revised = [200, 50];  // SOC at end of hour 0, 1
                const hourlyGeneration_revised = {
                    'Existing Gas': [500, 600],
                    'Storage': [-150, 150]  // Hour 0: charge 150 MW, Hour 1: discharge 150 MW
                };
                
                // Available at peak (hour 1) = min(200 MW capacity, 200 MWh SOC before peak) = 200 MW
                // Dispatched at peak = 150 MW
                // Unused = 200 - 150 = 50 MW
                
                const availableDispatchable = 600 + Math.min(200, storageSOC_revised[0]);  // Gas + Storage
                const actualDispatch = 600 + 150;  // Gas + Storage discharge
                const unusedCapacity = availableDispatchable - actualDispatch;
                const expectedRM = (unusedCapacity / peakLoad) * 100;
                
                const pass = Math.abs(expectedRM - 5.0) < 0.01;  // (50 / 1000) * 100 = 5%
                results.push({
                    name: testName,
                    pass: pass,
                    details: `Peak Load: ${peakLoad} MW at Hour ${peakLoadHour}\n` +
                             `Storage Capacity: 200 MW\n` +
                             `SOC at end of Hour 0: 200 MWh\n` +
                             `SOC at end of Hour 1 (peak): 50 MWh\n\n` +
                             `CRITICAL: Use SOC from BEFORE discharge!\n` +
                             `  SOC before peak (storageSOC[0]): 200 MWh\n` +
                             `  Available storage: min(200 MW, 200 MWh) = 200 MW ✓\n\n` +
                             `WRONG if using SOC after discharge:\n` +
                             `  SOC after peak (storageSOC[1]): 50 MWh\n` +
                             `  Available storage: min(200 MW, 50 MWh) = 50 MW ❌\n\n` +
                             `Calculation:\n` +
                             `  Available Dispatchable: ${availableDispatchable} MW (Gas: 600, Storage: 200)\n` +
                             `  Actual Dispatch: ${actualDispatch} MW (Gas: 600, Storage: 150)\n` +
                             `  Unused Capacity: ${unusedCapacity} MW\n` +
                             `  Reserve Margin: ${expectedRM.toFixed(2)}%\n` +
                             `  Status: ${pass ? 'PASS ✓' : 'FAIL ✗'}`
                });
            }
            
            // Test 6: Old formula comparison (to show the difference)
            {
                const testName = "Test 6: Old vs New Formula Comparison";
                const peakLoadHour = 0;
                const peakLoad = 1000; // MW
                
                const installedCapacities = {
                    'coal': 500,
                    'existing-gas': 600,
                    'solar': 300,
                    'wind': 200
                };
                
                const hourlyGeneration = {
                    'Coal': [300],
                    'Existing Gas': [400],
                    'Solar': [250],
                    'Wind': [150]
                };
                
                // OLD FORMULA (incorrect):
                // Total capacity = 500 + 600 + 300 + 200 = 1600 MW (included non-dispatchable!)
                // Old RM = ((1600 / 1000) - 1) × 100% = 60%
                
                // NEW FORMULA (correct):
                // Available dispatchable = 500 + 600 = 1100 MW (only dispatchable)
                // Actual dispatch = 300 + 400 = 700 MW
                // Unused = 1100 - 700 = 400 MW
                // New RM = (400 / 1000) × 100% = 40%
                
                const oldTotal = 1600;
                const oldRM = ((oldTotal / peakLoad) - 1) * 100;
                
                const availableDispatchable = 1100;
                const actualDispatch = 700;
                const unusedCapacity = 400;
                const newRM = (unusedCapacity / peakLoad) * 100;
                
                results.push({
                    name: testName,
                    pass: true,
                    details: `Peak Load: ${peakLoad} MW\n\n` +
                             `OLD FORMULA (Total Capacity / Peak - 1):\n` +
                             `  Total Capacity: ${oldTotal} MW (included non-dispatchable)\n` +
                             `  Old RM: ${oldRM.toFixed(2)}%\n\n` +
                             `NEW FORMULA (Unused Dispatchable / Peak):\n` +
                             `  Available Dispatchable: ${availableDispatchable} MW\n` +
                             `  Actual Dispatch: ${actualDispatch} MW\n` +
                             `  Unused: ${unusedCapacity} MW\n` +
                             `  New RM: ${newRM.toFixed(2)}%\n\n` +
                             `Difference: ${(oldRM - newRM).toFixed(2)}% (Old was higher)\n` +
                             `This shows the new formula correctly reflects actual operating reserves!`
                });
            }
            
            // Display results
            const resultsDiv = document.getElementById('results');
            let passCount = 0;
            let failCount = 0;
            
            results.forEach(result => {
                const div = document.createElement('div');
                div.className = `test-result ${result.pass ? 'pass' : 'fail'}`;
                div.innerHTML = `
                    <h3>${result.name}</h3>
                    <pre>${result.details}</pre>
                `;
                resultsDiv.appendChild(div);
                
                if (result.pass) passCount++;
                else failCount++;
            });
            
            // Add summary
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'summary';
            summaryDiv.innerHTML = `
                <h2>Test Summary</h2>
                <p>Total Tests: ${results.length}</p>
                <p style="color: #4caf50;">Passed: ${passCount}</p>
                <p style="color: #f44336;">Failed: ${failCount}</p>
                <p><strong>${failCount === 0 ? '✓ All tests passed!' : '✗ Some tests failed'}</strong></p>
            `;
            resultsDiv.insertBefore(summaryDiv, resultsDiv.firstChild);
        }
        
        // Run tests on page load
        window.addEventListener('load', runTests);
    </script>
</body>
</html>
